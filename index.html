<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Speed Tracker</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: #fff;
    font-family: Arial;
    text-align: center;
}

h1 { margin: 10px; }

#container {
    position: relative;
    display: inline-block;
}

video, canvas {
    width: 90vw;
    max-width: 500px;
    border-radius: 10px;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #00ffcc;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

.speed { font-size: 24px; color: #00ffcc; }
.peak { color: #ffcc00; }
.status { color: #aaa; }

</style>
</head>

<body>

<h1>Ball Speed Tracker</h1>

<button onclick="startCamera()">Start Camera</button>

<div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div class="speed">Speed: <span id="speed">0</span> km/h</div>
<div class="peak">Peak: <span id="peak">0</span> km/h</div>
<div class="status" id="status">Waiting...</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let positions = [];
let smoothSpeed = 0;
let peakSpeed = 0;

const PIXEL_TO_METER = 0.01;
const FPS = 30;

// 🎥 CAMERA (BACK)
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" } }
        });
        video.srcObject = stream;
        setup();
        status("Back camera started");
    } catch {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        setup();
        status("Camera started");
    }
}

function setup() {
    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        track();
    };
}

// 🔁 MAIN LOOP
function track() {
    requestAnimationFrame(track);

    if (video.readyState !== 4) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    let frame = ctx.getImageData(0,0,canvas.width,canvas.height);
    let points = [];

    // 🔴 RED BALL DETECTION
    for (let y=0; y<canvas.height; y+=3) {
        for (let x=0; x<canvas.width; x+=3) {

            let i = (y * canvas.width + x) * 4;

            let r = frame.data[i];
            let g = frame.data[i+1];
            let b = frame.data[i+2];

            if (r > 150 && g < 100 && b < 100 && (r - g > 50)) {
                points.push({x,y});
            }
        }
    }

    if (points.length > 30) {
        let avgX=0, avgY=0;

        points.forEach(p => {
            avgX += p.x;
            avgY += p.y;
        });

        avgX /= points.length;
        avgY /= points.length;

        positions.push({x:avgX,y:avgY});
        if (positions.length > 40) positions.shift();

        drawPath();
        drawBall(avgX, avgY);
        calculateSpeed();

        status("Tracking...");
    } else {
        status("Waiting for ball");
        document.getElementById('speed').innerText = "0";
    }
}

// ✨ TRAIL
function drawPath() {
    ctx.beginPath();
    positions.forEach((p,i)=>{
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
    });
    ctx.strokeStyle="rgba(0,255,200,0.8)";
    ctx.lineWidth=3;
    ctx.shadowBlur=10;
    ctx.shadowColor="#00ffcc";
    ctx.stroke();
}

// 🔴 BALL MARK
function drawBall(x,y){
    ctx.beginPath();
    ctx.arc(x,y,10,0,Math.PI*2);
    ctx.strokeStyle="red";
    ctx.lineWidth=2;
    ctx.stroke();
}

// ⚡ SPEED
function calculateSpeed(){
    if(positions.length<2) return;

    let p1=positions[positions.length-2];
    let p2=positions[positions.length-1];

    let dx=p2.x-p1.x;
    let dy=p2.y-p1.y;

    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<5) return; // ignore noise

    let meters = dist * PIXEL_TO_METER;
    let speed = meters * FPS * 3.6;

    smoothSpeed = 0.8*smoothSpeed + 0.2*speed;

    if(smoothSpeed>peakSpeed){
        peakSpeed = smoothSpeed;
        document.getElementById('peak').innerText = peakSpeed.toFixed(2);
    }

    document.getElementById('speed').innerText = smoothSpeed.toFixed(2);
}

// 🧾 STATUS
function status(msg){
    document.getElementById('status').innerText = msg;
}
</script>

</body>
</html>
