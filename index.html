<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Speed Tracker</title>

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    h1 {
        margin: 10px;
        font-weight: 600;
    }

    #container {
        position: relative;
        display: inline-block;
        margin-top: 10px;
    }

    video, canvas {
        width: 90vw;
        max-width: 500px;
        border-radius: 10px;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        background: #00ffcc;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    #info {
        margin-top: 10px;
        font-size: 18px;
    }

    .speed {
        font-size: 26px;
        font-weight: bold;
        color: #00ffcc;
    }

    .status {
        font-size: 14px;
        color: #aaa;
    }

    .peak {
        font-size: 14px;
        color: #ffcc00;
    }
</style>
</head>

<body>

<h1>Ball Speed Tracker</h1>

<button onclick="startCamera()">Start Camera</button>

<div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div id="info">
    <div class="speed">Speed: <span id="speed">0</span> km/h</div>
    <div class="peak">Peak: <span id="peak">0</span> km/h</div>
    <div class="status" id="status">Waiting for camera...</div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let positions = [];
let lastTime = performance.now();
let smoothSpeed = 0;
let peakSpeed = 0;

const PIXEL_TO_METER = 0.01;
const FPS = 30;

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        track();
    };

    document.getElementById('status').innerText = "Camera started...";
}

function track() {
    requestAnimationFrame(track);

    if (video.readyState !== 4) return;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let gray = [];

    // Convert to grayscale
    for (let i = 0; i < frame.data.length; i += 4) {
        let g = (frame.data[i] + frame.data[i+1] + frame.data[i+2]) / 3;
        gray.push(g);
    }

    // Simple threshold (detect bright objects)
    let threshold = 200;
    let candidates = [];

    for (let y = 1; y < canvas.height - 1; y += 4) {
        for (let x = 1; x < canvas.width - 1; x += 4) {
            let i = y * canvas.width + x;
            if (gray[i] > threshold) {
                candidates.push({x, y});
            }
        }
    }

    if (candidates.length > 20) {
        let avgX = 0, avgY = 0;

        candidates.forEach(p => {
            avgX += p.x;
            avgY += p.y;
        });

        avgX /= candidates.length;
        avgY /= candidates.length;

        positions.push({x: avgX, y: avgY});

        if (positions.length > 40) positions.shift();

        drawPath();
        drawBall(avgX, avgY);

        calculateSpeed();

        document.getElementById('status').innerText = "Tracking...";
    } else {
        document.getElementById('status').innerText = "Waiting for ball";
        document.getElementById('speed').innerText = "0";
    }
}

function drawPath() {
    ctx.beginPath();
    for (let i = 0; i < positions.length; i++) {
        let p = positions[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = "rgba(0,255,200,0.8)";
    ctx.lineWidth = 3;
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#00ffcc";
    ctx.stroke();
}

function drawBall(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI * 2);
    ctx.strokeStyle = "#ff0000";
    ctx.lineWidth = 2;
    ctx.stroke();
}

function calculateSpeed() {
    if (positions.length < 2) return;

    let p1 = positions[positions.length - 2];
    let p2 = positions[positions.length - 1];

    let dx = p2.x - p1.x;
    let dy = p2.y - p1.y;

    let pixelDist = Math.sqrt(dx*dx + dy*dy);

    if (pixelDist < 2) return;

    let meterDist = pixelDist * PIXEL_TO_METER;
    let speedMS = meterDist * FPS;
    let speedKMH = speedMS * 3.6;

    smoothSpeed = 0.8 * smoothSpeed + 0.2 * speedKMH;

    if (smoothSpeed > peakSpeed) {
        peakSpeed = smoothSpeed;
        document.getElementById('peak').innerText = peakSpeed.toFixed(2);
    }

    document.getElementById('speed').innerText = smoothSpeed.toFixed(2);
}
</script>

</body>
</html>
