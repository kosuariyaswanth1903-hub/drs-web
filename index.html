<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DRS Desktop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    
    <header>
      <h1>🏏 DRS System</h1>
    </header>

    <div class="main">
      <div class="video-section">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
      </div>

      <div class="panel">
        <h2>Live Stats</h2>
        <p>Status: <span id="status">Starting...</span></p>
        <p>Speed: <span id="speed">0</span> km/h</p>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
